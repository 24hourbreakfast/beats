<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetProxy Robotics | Registry Confirmed</title>
  <style>
    :root { --bg:#f2f6fb; --card:#fff; --ink:#102333; --muted:#5f7384; --line:#d4deea; --brand:#2276ff; --brand2:#27c8a9; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif; background:linear-gradient(180deg,#eef4fb 0%,#f8fbff 100%); color:var(--ink); }
    .wrap { width:min(760px,92vw); margin:54px auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:28px; }
    h1 { margin:0 0 8px; font-size:clamp(30px,4.8vw,42px); line-height:1.05; }
    p { margin:10px 0; color:var(--muted); font-size:16px; }
    .bar { margin-top:16px; border-radius:10px; background:linear-gradient(90deg,var(--brand),var(--brand2)); color:#fff; padding:10px 12px; font-weight:700; }
    .btns { margin-top:18px; display:flex; gap:10px; flex-wrap:wrap; }
    a.btn { text-decoration:none; border-radius:8px; padding:10px 14px; font-weight:700; font-size:14px; }
    a.primary { background:linear-gradient(90deg,var(--brand),var(--brand2)); color:#fff; }
    a.secondary { background:#fff; border:1px solid var(--line); color:#1f3f57; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Registry Confirmed</h1>
      <p>Thanks — your contact details were received.</p>
      <p>You are now in the investor interest registry for the next allocation window notice.</p>
      <div class="bar">Status: queued for next capital access update</div>
      <div class="btns">
        <a class="btn primary" href="/investors/">Back to Investors Page</a>
        <a class="btn secondary" href="/">Return to bernban.com</a>
      </div>
    </section>
  </main>
</body>
</html>
