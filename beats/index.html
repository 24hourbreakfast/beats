<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bern Ban Beats</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&family=Oxanium:wght@500;700&family=Share+Tech+Mono&family=Space+Grotesk:wght@500;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme-system.css">
  <style>
    .beats-shell {
      display: grid;
      gap: 18px;
    }

    .beats-top {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .beats-title {
      margin: 0;
      font: 700 clamp(26px, 6vw, 58px) / 1 var(--display);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 16px var(--glow);
    }

    .beats-sub {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .badge {
      color: var(--muted);
      font: 700 11px/1 var(--display);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .track {
      padding: 14px;
    }

    .track-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .track-name {
      margin: 0;
      font: 700 24px/1 var(--display);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .track-date {
      color: var(--muted);
      font-size: 20px;
    }

    .track-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .seek {
      width: 100%;
      accent-color: var(--accent);
    }

    .track-meta {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
    }

    .track-meta a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .track-meta a:hover {
      text-decoration: underline;
    }

    .empty {
      padding: 18px;
      border-radius: 16px;
      border: 1px dashed var(--line-strong);
      color: var(--muted);
      background: var(--panel-soft);
    }

    .back-home {
      color: var(--accent-2);
      text-decoration: none;
      font: 700 13px/1 var(--display);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      .track-name {
        font-size: 18px;
      }

      .track-date {
        font-size: 15px;
      }
    }
  </style>
</head>
<body class="screen-noise">
  <div class="scene-art" aria-hidden="true"></div>
  <div class="orb-bg"></div>
  <div class="horizon-glow"></div>
  <main class="site-wrap beats-shell">
    <section class="glass beats-top">
      <div>
        <p class="badge">Private Workspace</p>
        <h1 class="beats-title">Bern Ban Beats</h1>
        <p class="beats-sub">Work-in-progress vault for direct collaborators.</p>
      </div>
      <div class="theme-dock">
        <a class="back-home" data-theme-link href="/">Home</a>
        <button class="theme-pill" type="button" data-theme-option="neon-dusk" aria-pressed="false">Neon Dusk</button>
        <button class="theme-pill" type="button" data-theme-option="sunset-tape" aria-pressed="false">Sunset Tape</button>
        <button class="theme-pill" type="button" data-theme-option="chrome-night" aria-pressed="false">Chrome Night</button>
      </div>
    </section>

    <section id="list" class="list" aria-live="polite"></section>
  </main>

  <script src="/assets/theme-controller.js"></script>
  <script>
    (() => {
      const list = document.getElementById("list");

      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));

      const fmt = (seconds) => {
        if (!Number.isFinite(seconds)) return "--:--";
        const s = Math.floor(seconds);
        const m = Math.floor(s / 60);
        return m + ":" + String(s % 60).padStart(2, "0");
      };

      let active = null;

      const row = (track) => {
        const safeTitle = escapeHtml(track.title || track.file || "Untitled");
        const dateLabel = escapeHtml(track.date_label || "Unknown date");
        const src = encodeURIComponent(track.file || "");
        return `
          <article class="glass track">
            <div class="track-head">
              <h2 class="track-name">${safeTitle}</h2>
              <span class="track-date">${dateLabel}</span>
            </div>
            <div class="track-controls">
              <button class="player-btn" type="button" data-action="play">Play</button>
              <input class="seek" type="range" min="0" max="100" value="0" step="0.1" data-role="seek" aria-label="Seek">
            </div>
            <div class="track-meta">
              <span data-role="time">0:00 / --:--</span>
              <a href="${src}" download>Download</a>
            </div>
            <audio preload="none" src="${src}"></audio>
          </article>
        `;
      };

      const bindPlayer = (trackEl) => {
        const audio = trackEl.querySelector("audio");
        const button = trackEl.querySelector("[data-action='play']");
        const seek = trackEl.querySelector("[data-role='seek']");
        const time = trackEl.querySelector("[data-role='time']");

        const sync = () => {
          const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
          seek.value = pct;
          time.textContent = fmt(audio.currentTime) + " / " + fmt(audio.duration);
        };

        button.addEventListener("click", () => {
          if (active && active !== audio) active.pause();
          if (audio.paused) {
            audio.play();
            active = audio;
          } else {
            audio.pause();
          }
        });

        audio.addEventListener("play", () => {
          button.textContent = "Pause";
        });

        audio.addEventListener("pause", () => {
          button.textContent = "Play";
          if (active === audio) active = null;
        });

        audio.addEventListener("timeupdate", sync);
        audio.addEventListener("loadedmetadata", sync);
        audio.addEventListener("ended", sync);

        seek.addEventListener("input", () => {
          if (!audio.duration) return;
          audio.currentTime = (Number(seek.value) / 100) * audio.duration;
          sync();
        });
      };

      fetch("tracks.json?t=" + Date.now(), { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then((data) => {
          const tracks = Array.isArray(data.tracks) ? data.tracks : [];
          if (!tracks.length) {
            list.innerHTML = '<p class="empty">No tracks yet.</p>';
            return;
          }
          list.innerHTML = tracks.map(row).join("");
          Array.from(list.querySelectorAll(".track")).forEach(bindPlayer);
        })
        .catch(() => {
          list.innerHTML = '<p class="empty">Could not load track list.</p>';
        });
    })();
  </script>
</body>
</html>
