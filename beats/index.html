<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bern Ban Beats</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/sea-neon.css">
</head>
<body>
  <div class="site-bg" aria-hidden="true"></div>
  <div class="glitter" aria-hidden="true"></div>
  <main class="wrap">
    <nav class="menu">
      <p class="menu-logo">Bern Ban Beats</p>
      <div class="menu-links">
        <a href="/">Home</a>
        <a href="mailto:bernban@bernban.com">Contact</a>
      </div>
    </nav>

    <section class="panel">
      <h1 class="beats-title">WIP Vault</h1>
      <p class="beats-sub">Private workspace for active collaboration.</p>
      <section class="player-shell" aria-live="polite">
        <div class="player-main">
          <img id="now-art" class="now-art" src="/assets/art-dream-reveal.svg" alt="" />
          <p id="now-title" class="now-title">Select a track</p>
          <p id="now-date" class="now-date"></p>
          <audio id="main-player" controls preload="none" controlslist="nodownload noplaybackrate"></audio>
        </div>
        <ol id="track-list" class="playlist"></ol>
      </section>
    </section>
  </main>

  <script>
    (() => {
      const list = document.getElementById("track-list");
      const player = document.getElementById("main-player");
      const nowTitle = document.getElementById("now-title");
      const nowDate = document.getElementById("now-date");
      const nowArt = document.getElementById("now-art");

      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));

      const fmt = (seconds) => {
        if (!Number.isFinite(seconds)) return "--:--";
        const s = Math.floor(seconds);
        const m = Math.floor(s / 60);
        return m + ":" + String(s % 60).padStart(2, "0");
      };

      const cleanTitle = (track) => {
        const source = track.title || track.file || "Untitled";
        return source.replace(/^bern ban\s*[-–—]?\s*/i, "").trim() || "Untitled";
      };

      const cleanDate = (label) => {
        const v = (label || "").trim();
        if (!v || v.toLowerCase() === "unknown date") return "";
        return v;
      };

      const row = (track, idx) => {
        const safeTitle = escapeHtml(cleanTitle(track));
        const dateLabel = cleanDate(track.date_label);
        const safeDate = escapeHtml(dateLabel);
        const safeArtwork = escapeHtml(track.artwork || "/assets/art-dream-reveal.svg");
        return `
          <li>
            <button class="track-btn" type="button" data-idx="${idx}">
              <img class="track-art" src="${safeArtwork}" alt="" loading="lazy" />
              <span class="track-name">${safeTitle}</span>
              <span class="track-date">${safeDate}</span>
            </button>
          </li>
        `;
      };

      let tracks = [];
      let current = -1;

      const highlight = () => {
        Array.from(list.querySelectorAll(".track-btn")).forEach((btn) => {
          btn.classList.toggle("active", Number(btn.dataset.idx) === current);
        });
      };

      const loadTrack = (idx, autoplay) => {
        if (idx < 0 || idx >= tracks.length) return;
        const track = tracks[idx];
        current = idx;
        player.src = encodeURIComponent(track.file || "");
        nowTitle.textContent = cleanTitle(track);
        nowDate.textContent = cleanDate(track.date_label);
        nowArt.src = track.artwork || "/assets/art-dream-reveal.svg";
        highlight();
        if (autoplay) player.play();
      };

      const normalized = (value) => cleanTitle({ title: value }).toLowerCase();

      const applyPlaylistConfig = (allTracks, cfg) => {
        const config = cfg || {};
        const excludeTitles = new Set((config.exclude_titles || []).map(normalized));
        const excludeFiles = new Set((config.exclude_files || []).map((v) => String(v || "").toLowerCase()));
        const desiredOrder = (config.order_titles || []).map(normalized);
        const orderMap = new Map(desiredOrder.map((title, idx) => [title, idx]));

        return allTracks
          .filter((track) => {
            const titleKey = normalized(track.title || track.file || "");
            const fileKey = String(track.file || "").toLowerCase();
            if (excludeTitles.has(titleKey)) return false;
            if (excludeFiles.has(fileKey)) return false;
            return true;
          })
          .sort((a, b) => {
            const aKey = normalized(a.title || a.file || "");
            const bKey = normalized(b.title || b.file || "");
            const aPos = orderMap.has(aKey) ? orderMap.get(aKey) : Number.POSITIVE_INFINITY;
            const bPos = orderMap.has(bKey) ? orderMap.get(bKey) : Number.POSITIVE_INFINITY;
            if (aPos !== bPos) return aPos - bPos;
            return aKey.localeCompare(bKey);
          });
      };

      const applyStrictPlaylist = (allTracks, cfg) => {
        const listCfg = Array.isArray(cfg.playlist) ? cfg.playlist : [];
        if (!listCfg.length) return null;
        const byTitle = new Map(allTracks.map((track) => [normalized(track.title || track.file || ""), track]));
        return listCfg
          .map((item) => {
            const key = normalized(item.title || "");
            const found = byTitle.get(key);
            if (!found) return null;
            return {
              ...found,
              artwork: item.artwork || "/assets/art-dream-reveal.svg"
            };
          })
          .filter(Boolean);
      };

      Promise.all([
        fetch("tracks.json?t=" + Date.now(), { cache: "no-store" }).then((res) => {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        }),
        fetch("playlist.json?t=" + Date.now(), { cache: "no-store" })
          .then((res) => (res.ok ? res.json() : {}))
          .catch(() => ({}))
      ])
        .then(([data, playlistCfg]) => {
          const allTracks = Array.isArray(data.tracks) ? data.tracks : [];
          const strict = applyStrictPlaylist(allTracks, playlistCfg);
          tracks = strict && strict.length ? strict : applyPlaylistConfig(allTracks, playlistCfg);
          if (!tracks.length) {
            list.innerHTML = '<p class="empty">No tracks yet.</p>';
            return;
          }
          list.innerHTML = tracks.map((track, idx) => row(track, idx)).join("");
          list.addEventListener("click", (event) => {
            const btn = event.target.closest(".track-btn");
            if (!btn) return;
            loadTrack(Number(btn.dataset.idx), true);
          });
          loadTrack(0, false);
          player.addEventListener("ended", () => loadTrack(current + 1, true));
        })
        .catch(() => {
          list.innerHTML = '<p class="empty">Could not load track list.</p>';
        });
    })();
  </script>
</body>
</html>
