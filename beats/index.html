<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bern Ban Beats</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-0:#070915;
      --bg-1:#130f2c;
      --pink:#ff4fa5;
      --cyan:#62f5ff;
      --violet:#9f74ff;
      --ink:#eff6ff;
      --muted:#bfd1ff;
      --panel:rgba(8,12,36,.78);
      --line:rgba(98,245,255,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--ink);
      font:18px/1.4 "VT323",monospace;
      background:
        radial-gradient(circle at 18% 15%,rgba(255,79,165,.23) 0,rgba(255,79,165,0) 40%),
        radial-gradient(circle at 82% 15%,rgba(98,245,255,.23) 0,rgba(98,245,255,0) 35%),
        linear-gradient(180deg,var(--bg-0),var(--bg-1) 55%,#080b1e);
      min-height:100vh;
    }
    .bg{
      position:fixed;
      inset:0;
      background:url("/beats/assets/vapor-grid.svg") center/cover no-repeat;
      mix-blend-mode:screen;
      opacity:.6;
      pointer-events:none;
    }
    .scan{
      position:fixed;
      inset:0;
      background:linear-gradient(rgba(255,255,255,.08) 50%,rgba(0,0,0,.05) 50%);
      background-size:100% 4px;
      opacity:.12;
      pointer-events:none;
    }
    .wrap{
      width:min(980px,92vw);
      margin:40px auto 60px;
      position:relative;
      z-index:1;
    }
    .hero{
      border:1px solid var(--line);
      background:linear-gradient(140deg,rgba(159,116,255,.2),rgba(98,245,255,.08));
      padding:22px 20px 16px;
      border-radius:14px;
      box-shadow:0 0 50px rgba(159,116,255,.25);
      margin-bottom:22px;
    }
    h1{
      margin:0;
      font:700 clamp(34px,7vw,72px)/1 "Orbitron",sans-serif;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-shadow:0 0 16px rgba(255,79,165,.65);
    }
    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:26px;
    }
    .list{
      display:grid;
      gap:14px;
    }
    .track{
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel);
      padding:14px 14px 12px;
      backdrop-filter:blur(2px);
      transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
    }
    .track:hover{
      transform:translateY(-2px);
      border-color:rgba(255,79,165,.45);
      box-shadow:0 10px 26px rgba(0,0,0,.26);
    }
    .track-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }
    .name{
      margin:0;
      font-family:"Orbitron",sans-serif;
      letter-spacing:.04em;
      font-size:17px;
      text-transform:uppercase;
      color:#fff;
    }
    .date{
      color:var(--muted);
      font-size:22px;
      white-space:nowrap;
    }
    .controls{
      display:flex;
      align-items:center;
      gap:10px;
    }
    button{
      border:1px solid rgba(255,79,165,.7);
      background:linear-gradient(140deg,rgba(255,79,165,.22),rgba(159,116,255,.28));
      color:#fff;
      border-radius:999px;
      font:20px/1 "Orbitron",sans-serif;
      letter-spacing:.08em;
      padding:8px 16px;
      cursor:pointer;
      transition:filter .2s ease;
    }
    button:hover{filter:brightness(1.15)}
    input[type="range"]{
      width:100%;
      accent-color:var(--cyan);
    }
    .meta{
      display:flex;
      justify-content:space-between;
      margin-top:5px;
      color:var(--muted);
      font-size:23px;
    }
    a{
      color:var(--cyan);
      text-decoration:none;
    }
    a:hover{text-decoration:underline}
    .empty{
      border:1px dashed rgba(255,79,165,.5);
      border-radius:12px;
      padding:22px;
      color:var(--muted);
      font-size:26px;
      background:rgba(255,79,165,.1);
    }
    @media (max-width: 720px){
      .meta{font-size:20px}
      .name{font-size:15px}
      .date{font-size:18px}
      button{font-size:16px;padding:7px 13px}
      .sub{font-size:21px}
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="scan"></div>
  <main class="wrap">
    <section class="hero">
      <h1>Bern Ban Beats</h1>
      <p class="sub">Latest drops first. Stream or download.</p>
    </section>

    <section id="list" class="list" aria-live="polite"></section>
  </main>

  <script>
    (function(){
      const list = document.getElementById("list");

      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (ch) => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;"
      }[ch]));

      const fmt = (seconds) => {
        if (!Number.isFinite(seconds)) return "--:--";
        const s = Math.floor(seconds);
        const m = Math.floor(s / 60);
        return m + ":" + String(s % 60).padStart(2, "0");
      };

      let active = null;

      const bindPlayer = (track) => {
        const audio = track.querySelector("audio");
        const button = track.querySelector("[data-action='play']");
        const seek = track.querySelector("[data-role='seek']");
        const time = track.querySelector("[data-role='time']");

        const sync = () => {
          const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
          seek.value = pct;
          time.textContent = fmt(audio.currentTime) + " / " + fmt(audio.duration);
        };

        button.addEventListener("click", () => {
          if (active && active !== audio) {
            active.pause();
          }
          if (audio.paused) {
            audio.play();
            active = audio;
          } else {
            audio.pause();
          }
        });

        audio.addEventListener("play", () => {
          button.textContent = "PAUSE";
        });

        audio.addEventListener("pause", () => {
          button.textContent = "PLAY";
          if (active === audio) active = null;
        });

        audio.addEventListener("timeupdate", sync);
        audio.addEventListener("loadedmetadata", sync);
        audio.addEventListener("ended", () => {
          seek.value = 0;
          sync();
        });

        seek.addEventListener("input", () => {
          if (!audio.duration) return;
          audio.currentTime = (Number(seek.value) / 100) * audio.duration;
          sync();
        });
      };

      const row = (track) => {
        const safeTitle = escapeHtml(track.title || track.file || "Untitled");
        const dateLabel = escapeHtml(track.date_label || "Unknown date");
        const encoded = encodeURIComponent(track.file || "");
        const src = encoded;
        return `
          <article class="track">
            <div class="track-top">
              <h2 class="name">${safeTitle}</h2>
              <span class="date">${dateLabel}</span>
            </div>
            <div class="controls">
              <button type="button" data-action="play">PLAY</button>
              <input type="range" min="0" max="100" value="0" step="0.1" data-role="seek" aria-label="Seek">
            </div>
            <div class="meta">
              <span data-role="time">0:00 / --:--</span>
              <a href="${src}" download>Download</a>
            </div>
            <audio preload="none" src="${src}"></audio>
          </article>
        `;
      };

      fetch("tracks.json?t=" + Date.now(), { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then((data) => {
          const tracks = Array.isArray(data.tracks) ? data.tracks : [];
          if (!tracks.length) {
            list.innerHTML = '<p class="empty">No tracks yet.</p>';
            return;
          }
          list.innerHTML = tracks.map(row).join("");
          Array.from(list.querySelectorAll(".track")).forEach(bindPlayer);
        })
        .catch(() => {
          list.innerHTML = '<p class="empty">Could not load track list.</p>';
        });
    })();
  </script>
</body>
</html>
