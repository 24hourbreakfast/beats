<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>beats in progress</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/sea-neon.css">
</head>
<body class="beats-workbench">
  <div class="site-bg" aria-hidden="true"></div>
  <div class="glitter" aria-hidden="true"></div>
  <main class="wrap">
    <nav class="menu">
      <p class="menu-logo">Bern Ban Beats</p>
      <div class="menu-links">
        <a href="/">Home</a>
        <a href="mailto:bernban@bernban.com">Contact</a>
      </div>
    </nav>

    <section class="panel in-progress-panel">
      <h1 class="beats-title">beats in progress</h1>
      <div class="in-progress-player">
        <p id="now-title" class="now-title">Select a beat</p>
        <p id="now-date" class="now-date"></p>
        <audio id="main-player" controls preload="none"></audio>
      </div>
      <div id="copy-status" class="copy-status" aria-live="polite"></div>
      <div id="track-list" class="work-list"></div>
    </section>
  </main>

  <script>
    (() => {
      const list = document.getElementById("track-list");
      const player = document.getElementById("main-player");
      const nowTitle = document.getElementById("now-title");
      const nowDate = document.getElementById("now-date");
      const copyStatus = document.getElementById("copy-status");

      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));

      const displayTitle = (track) => {
        return (track.file || track.title || "Untitled").trim() || "Untitled";
      };

      const trackUrl = (track) => {
        return "/inprogress/" + encodeURIComponent(track.file || "");
      };

      const setNowPlaying = (track) => {
        nowTitle.textContent = displayTitle(track);
        nowDate.textContent = track.date_label || "";
        player.src = trackUrl(track);
      };

      const setStatus = (message) => {
        copyStatus.textContent = message;
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => {
          copyStatus.textContent = "";
        }, 2200);
      };

      const row = (track, idx) => {
        const safeTitle = escapeHtml(displayTitle(track));
        const safeDate = escapeHtml(track.date_label || "");
        const safeUrl = escapeHtml(trackUrl(track));
        return `
          <article class="work-row">
            <div class="work-meta">
              <button class="work-play" type="button" data-idx="${idx}">Play</button>
              <div>
                <p class="work-title">${safeTitle}</p>
                <p class="work-date">${safeDate}</p>
              </div>
            </div>
            <div class="work-actions">
              <a class="work-link" href="${safeUrl}" download>Download</a>
              <button class="work-link work-copy" type="button" data-url="${safeUrl}">Copy MP3 Link</button>
            </div>
          </article>
        `;
      };

      let tracks = [];
      let current = -1;

      const highlight = () => {
        Array.from(list.querySelectorAll(".work-row")).forEach((rowEl, idx) => {
          rowEl.classList.toggle("active", idx === current);
        });
      };

      const loadTrack = (idx, autoplay) => {
        if (idx < 0 || idx >= tracks.length) return;
        current = idx;
        setNowPlaying(tracks[idx]);
        highlight();
        if (autoplay) {
          player.play().catch(() => {});
        }
      };

      const copyLink = async (url) => {
        const absolute = new URL(url, window.location.origin).toString();
        try {
          await navigator.clipboard.writeText(absolute);
          setStatus("MP3 link copied.");
        } catch (error) {
          setStatus("Could not copy link.");
        }
      };

      fetch("inprogress-tracks.json?t=" + Date.now(), { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then((data) => {
          tracks = Array.isArray(data.tracks) ? data.tracks : [];
          if (!tracks.length) {
            list.innerHTML = '<p class="empty">No beats in progress yet.</p>';
            return;
          }
          list.innerHTML = tracks.map((track, idx) => row(track, idx)).join("");
          list.addEventListener("click", (event) => {
            const playBtn = event.target.closest(".work-play");
            if (playBtn) {
              loadTrack(Number(playBtn.dataset.idx), true);
              return;
            }
            const copyBtn = event.target.closest(".work-copy");
            if (copyBtn) {
              copyLink(copyBtn.dataset.url);
            }
          });
          loadTrack(0, false);
        })
        .catch(() => {
          list.innerHTML = '<p class="empty">Could not load beats in progress.</p>';
        });
    })();
  </script>
</body>
</html>
